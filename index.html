<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#172019" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Way of the Bell" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Way of the Bell - The Practice Is the Path</title>
  <style>
    :root{
      --bg:#172019;
      --surface:#f7efe0;
      --surface2:#efe2ca;
      --text:#251b13;
      --muted:#725f4a;
      --line:#d4bd94;
      --acc:#b84a2f;
      --gold:#b88a37;
      --ink:#18231d;
      --good:#436f48;
      --mid:#9a7831;
      --rec:#506f83;
      --danger:#8d3e34;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; padding:18px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        linear-gradient(180deg, rgba(12,18,13,0.10), rgba(12,18,13,0.62)),
        url("scene-temple.jpg") center top / cover fixed,
        #172019;
      color:var(--text);
      min-height:100vh;
    }
    .wrap{ max-width:1060px; margin:0 auto; display:grid; gap:14px; }
    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .card{
      background: rgba(247,239,224,0.90);
      border:1px solid var(--line);
      border-radius:8px;
      padding:16px;
      box-shadow: 0 18px 48px rgba(5,10,6,0.28);
      backdrop-filter: blur(8px);
    }
    .masthead{
      position:relative;
      overflow:hidden;
      min-height:clamp(340px, 44vw, 480px);
      display:grid;
      align-items:end;
      border-color: rgba(231,183,91,0.54);
      background:
        linear-gradient(90deg, rgba(12,18,13,0.68), rgba(12,18,13,0.26) 52%, rgba(12,18,13,0.04)),
        linear-gradient(180deg, rgba(0,0,0,0.00), rgba(0,0,0,0.28)),
        url("scene-carry.jpg") center center / cover;
      color:#f7efe0;
    }
    .masthead::before{
      content:"";
      position:absolute; left:18px; right:18px; top:0;
      height:8px;
      background: linear-gradient(90deg, transparent, var(--acc), var(--gold), var(--acc), transparent);
      opacity:.95;
    }
    .masthead::after{
      content:"";
      position:absolute; right:16px; top:16px;
      width:74px; height:42px;
      border-top:7px solid rgba(247,239,224,0.22);
      border-left:28px solid transparent;
      border-right:28px solid transparent;
      opacity:.65;
    }
    .masthead h1{ color:#f7efe0; text-shadow:0 2px 14px rgba(0,0,0,0.52); }
    .masthead .small{ color:#e6c98c; text-shadow:0 1px 10px rgba(0,0,0,0.50); }
    .brand{
      display:flex;
      gap:16px;
      align-items:center;
      padding-right:72px;
      width:min(620px, 100%);
      padding:14px;
      border:1px solid rgba(231,183,91,0.26);
      border-radius:8px;
      background: rgba(17,25,19,0.44);
      backdrop-filter: blur(6px);
    }
    .brand-logo{
      width:112px;
      height:112px;
      object-fit:contain;
      flex:0 0 auto;
      border-radius:8px;
      box-shadow:0 10px 28px rgba(0,0,0,0.28);
    }
    .brand-copy{ min-width:0; }
    .hero-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:14px;
    }
    .btn.main-action{
      min-height:52px;
      padding:14px 20px;
      border-radius:999px;
      border-color: rgba(247,239,224,0.72);
      background:
        linear-gradient(135deg, rgba(184,74,47,0.96), rgba(184,138,55,0.92));
      color:#fff8e8;
      font-size:15px;
      letter-spacing:.04em;
      text-transform:uppercase;
      box-shadow: 0 14px 34px rgba(5,10,6,0.38), inset 0 1px 0 rgba(255,255,255,0.24);
    }
    .btn.main-action:hover{
      border-color: rgba(255,250,239,0.92);
      filter:saturate(1.08);
    }
    .hero-actions #btnReset{
      color:#f2dec0;
      border-color: rgba(247,239,224,0.36);
      background: rgba(17,25,19,0.38);
    }
    .hero-actions #btnInstall{
      display:none;
      color:#f2dec0;
      border-color: rgba(247,239,224,0.36);
      background: rgba(17,25,19,0.38);
    }
    .hero-actions #btnInstall.show{ display:inline-flex; }
    .hero-actions #trainPill{
      color:#f2dec0;
      border-color: rgba(247,239,224,0.30);
      background: rgba(17,25,19,0.44);
    }
    .hero-actions #trainPill strong{ color:#fff8e8; }
    @media (max-width: 520px){
      .brand{
        gap:12px;
        padding-right:0;
      }
      .brand-logo{
        width:86px;
        height:86px;
      }
      .masthead::after{ display:none; }
    }
    h1{ font-size:20px; margin:6px 0 6px; letter-spacing:.02em; }
    h2{ font-size:15px; margin:0 0 8px; color:var(--text); }
    p{ margin:0; color:var(--muted); line-height:1.35; font-size:13px; }
    .btn{
      appearance:none;
      border:1px solid rgba(32,40,34,0.12);
      background: rgba(255,250,239,0.58);
      color:var(--text);
      border-radius:8px;
      padding:10px 12px;
      font-weight:780;
      cursor:pointer;
      transition: transform .04s ease, background .12s ease, border-color .12s ease, opacity .12s ease;
      user-select:none;
    }
    .btn:active{ transform: translateY(1px); }
    .btn.primary{
      border-color: rgba(184,74,47,0.44);
      background: rgba(184,74,47,0.10);
      color:#5c2419;
    }
    .btn.danger{
      border-color: rgba(154,82,72,0.24);
      background: rgba(154,82,72,0.045);
      color: var(--danger);
    }
    .btn.good{
      border-color: rgba(75,139,96,0.38);
      background: rgba(75,139,96,0.10);
    }
    .btn.mid{
      border-color: rgba(154,120,49,0.35);
      background: rgba(154,120,49,0.10);
    }
    .btn.rec{
      border-color: rgba(93,120,148,0.35);
      background: rgba(93,120,148,0.08);
    }
    .btn:disabled{ opacity:.45; cursor:not-allowed; }

    .pill{
      display:inline-flex; gap:6px; align-items:center;
      padding:6px 10px; border-radius:999px;
      border:1px solid rgba(32,40,34,0.12);
      background: rgba(255,250,239,0.56);
      color:var(--muted);
      font-size:12px;
    }
    .pill strong{ color:var(--text); }
    .grid{ display:grid; grid-template-columns: 1fr; gap:14px; }
    @media (min-width: 880px){ .grid{ grid-template-columns: minmax(0,1fr) 320px; align-items:start; } }
    #rightCard{ display:none; position:sticky; top:18px; }
    #rightCard.active{ display:block; }
    .sectionTitle{ font-size:14px; margin:0 0 10px; color:var(--text); text-transform:uppercase; letter-spacing:.08em; }
    .sectionTitle::before{
      content:"";
      display:inline-block;
      width:18px;
      height:1px;
      margin-right:8px;
      vertical-align:middle;
      background: var(--gold);
    }
    .optionalCard{ opacity:.88; }
    .optionalCard .ex-title, .optionalCard .ex-meta{ font-style:italic; }
    .carryCard{ margin-top:0; }

    .hr{ height:1px; background:var(--line); margin:16px 0; }
    .small{ font-size:12px; color:var(--muted); }
    .time{
      font-variant-numeric: tabular-nums;
      font-size:46px; font-weight:850; letter-spacing:0; line-height:1;
      color: var(--ink);
      text-shadow: 0 1px 0 rgba(255,255,255,0.55);
    }
    .label{ color:var(--muted); font-size:12px; }
    .exercise{
      border:1px solid var(--line);
      background:
        linear-gradient(90deg, rgba(184,74,47,0.055), transparent 32%),
        var(--surface2);
      border-radius:8px;
      padding:14px 14px;
      display:flex; gap:14px; justify-content:space-between; align-items:flex-start;
    }
    .ex-left{ display:grid; gap:6px; }
    .ex-title{ font-weight:820; font-size:15px; line-height:1.2; }
    .ex-meta{ color:var(--muted); font-size:12px; line-height:1.35; }
    .exercise-media{
      display:flex;
      gap:10px;
      align-items:center;
      flex:0 0 auto;
    }
    .exercise-thumb-btn{
      width:58px;
      height:58px;
      border:1px solid rgba(32,40,34,0.12);
      border-radius:12px;
      padding:0;
      overflow:hidden;
      background:rgba(255,250,239,0.54);
      cursor:pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.26);
    }
    .exercise-thumb{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      opacity:.88;
      filter:saturate(.86) contrast(.96);
    }
    .exercise-thumb-btn:active{ transform:translateY(1px); }
    .exercise-preview{
      width:min(100%, 520px);
      margin-top:12px;
      border:1px solid var(--line);
      border-radius:10px;
      overflow:hidden;
      background:var(--surface2);
    }
    .exercise-preview img{
      display:block;
      width:100%;
      height:auto;
    }
    .warmup{
      border:1px solid var(--line);
      background:
        linear-gradient(90deg, rgba(184,138,55,0.10), transparent 40%),
        var(--surface2);
      border-radius:8px;
      padding:12px 14px;
      margin:0 0 16px;
    }
    .warmup summary{
      cursor:pointer;
      font-weight:850;
      user-select:none;
    }
    .warmup-list{
      display:grid;
      gap:6px;
      margin:10px 0 0;
      padding:0;
      list-style:none;
      color:var(--muted);
      font-size:13px;
    }

    /* Gate */
    .gate-grid{ display:grid; gap:16px; }
    .gate-row{ display:grid; gap:8px; }
    .score-row{ display:flex; gap:8px; flex-wrap:wrap; }
    .score-btn{
      width:42px; height:36px;
      display:inline-flex; justify-content:center; align-items:center;
      border-radius:999px;
      border:1px solid rgba(32,40,34,0.14);
      background:rgba(255,250,239,0.62);
      color:var(--text);
      font-weight:760;
      cursor:pointer;
      user-select:none;
      transition: transform .04s ease, background .12s ease, border-color .12s ease;
    }
    .score-btn:active{ transform: translateY(1px); }
    .score-btn.active{
      border-color: rgba(184,74,47,0.48);
      background: rgba(184,74,47,0.12);
      color: #64281d;
    }
    .total{
      display:flex; gap:10px; align-items:center; justify-content:space-between;
      border:1px solid var(--line);
      background: var(--surface2);
      border-radius:8px;
      padding:12px 14px;
    }
    .total .n{ font-size:28px; font-weight:900; font-variant-numeric: tabular-nums; }
    .badge{
      padding:6px 10px; border-radius:999px; font-size:12px; font-weight:900;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
    }
    .badge.good{ color: #315b3c; border-color: rgba(67,111,72,.34); background: rgba(67,111,72,.09); }
    .badge.mid{ color: #7a6027; border-color: rgba(184,138,55,.36); background: rgba(184,138,55,.10); }
    .badge.rec{ color: #405f7a; border-color: rgba(80,111,131,.34); background: rgba(80,111,131,.09); }

    /* Breathing */
    .breathBox{ display:grid; gap:12px; align-items:center; justify-items:center; padding:8px 0; }
    .ring{
      width:220px; height:220px; border-radius:999px;
      border: 2px solid rgba(184,138,55,0.26);
      background: rgba(255,250,239,0.42);
      display:grid; place-items:center;
      position: relative;
      overflow:hidden;
    }
    .ring::after{
      content:"";
      position:absolute; inset:12px;
      border-radius:999px;
      border: 1px solid rgba(32,40,34,0.08);
    }
    .ringInner{
      width:120px; height:120px; border-radius:999px;
      background: rgba(255,250,239,0.72);
      border: 1px solid rgba(184,138,55,0.22);
      display:grid; place-items:center;
      transition: transform 0.25s linear;
      z-index:1;
    }
    .phase{ font-weight:950; letter-spacing:.6px; text-align:center; }
    .phaseSub{ font-size:12px; color:var(--muted); margin-top:2px; text-align:center; }
    .progress{ width:100%; height:10px; border-radius:999px; border:1px solid rgba(32,40,34,0.12); background: rgba(255,255,255,0.55); overflow:hidden; }
    .progress > div{ height:100%; width:0%; background: linear-gradient(90deg, rgba(184,74,47,0.42), rgba(184,138,55,0.30)); }

    /* Confetti canvas */
    #confettiCanvas{ position:fixed; inset:0; pointer-events:none; z-index:9999; display:none; }
  
    .scale-legend{
      font-size:12px;
      color: var(--muted);
      opacity:.85;
      margin-top:6px;
      line-height:1.3;
    }
    
    .score-label{ margin-top:6px; min-height:18px; font-size:12px; color:var(--muted); font-weight:600; }
.score-btn.active{
      transform: scale(1.04);
      font-weight:700;
    }

    /* App modal (confirm + checkpoint) */
    #appModal{
      position:fixed; inset:0;
      background: rgba(10,18,12,0.58);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:10000;
      padding:16px;
    }
    #appModal.show{ display:flex; }
    .modalCard{
      width:min(560px, 100%);
      border:1px solid var(--line);
      background: var(--surface);
      border-radius:8px;
      padding:14px;
      box-shadow: none;
    }
    .modalTitle{ font-size:15px; font-weight:900; margin:0 0 6px; }
    .modalText{ font-size:13px; color:var(--muted); margin:0; line-height:1.35; }
    .modalRow{ display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }
    .modalList{ display:grid; gap:8px; margin-top:10px; }
    .modalItem{
      border:1px solid var(--line);
      background: rgba(0,0,0,0.18);
      border-radius:8px;
      padding:10px 12px;
      color:var(--text);
      font-size:13px;
    }
    .modalItem label{ display:flex; gap:10px; align-items:flex-start; cursor:pointer; }
    .modalItem input{ transform: translateY(2px); }
    .availabilityList{
      display:grid;
      gap:10px;
      max-height:min(62vh, 620px);
      overflow:auto;
      padding-right:2px;
    }
    .availabilityGroup{
      border:1px solid var(--line);
      border-radius:8px;
      background: rgba(255,250,239,0.48);
      overflow:hidden;
    }
    .availabilityGroup summary{
      cursor:pointer;
      user-select:none;
      padding:10px 12px;
      font-size:13px;
      font-weight:900;
      color:var(--text);
    }
    .availabilitySub{
      padding:0 12px 12px;
      display:grid;
      gap:8px;
    }
    .availabilitySubTitle{
      margin-top:6px;
      color:var(--muted);
      font-size:12px;
      font-weight:850;
      text-transform:uppercase;
      letter-spacing:.05em;
    }
    .availabilityRow{
      display:grid;
      grid-template-columns: minmax(160px, 1fr) minmax(150px, 1fr);
      gap:8px;
      align-items:center;
      padding:8px;
      border:1px solid rgba(32,40,34,0.10);
      border-radius:8px;
      background: rgba(255,250,239,0.56);
    }
    .availabilityRow.off{ opacity:.62; }
    .availabilityToggle{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:13px;
      font-weight:760;
      color:var(--text);
      min-width:0;
    }
    .availabilityToggle input{ flex:0 0 auto; }
    .availabilityReplacement{
      width:100%;
      min-width:0;
      border:1px solid rgba(32,40,34,0.16);
      border-radius:8px;
      background:rgba(255,250,239,0.72);
      color:var(--text);
      padding:9px 10px;
      font:inherit;
      font-size:13px;
    }
    @media (max-width: 620px){
      .availabilityRow{ grid-template-columns:1fr; }
    }

</style>
</head>
<body>
<canvas id="confettiCanvas"></canvas>

<div id="appModal" aria-hidden="true">
  <div class="modalCard" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalText">
    <div class="modalTitle" id="modalTitle">Way of the Bell</div>
    <p class="modalText" id="modalText">-</p>
    <div id="modalBody"></div>
    <div class="modalRow" id="modalActions"></div>
  </div>
</div>


<div class="wrap">
  <div class="card masthead">
    <div class="brand">
      <img class="brand-logo" src="brand-logo.png" alt="Way of the Bell logo" />
      <div class="brand-copy">
        <h1>Way of the Bell</h1>
        <p class="small">The practice is the path.</p>
      </div>
    </div>
    <div class="hero-actions">
      <button id="btnMain" class="btn main-action">Options</button>
      <button id="btnInstall" class="btn" type="button">Install</button>
      <button id="btnReset" class="btn" title="Clears selection memory and today's active status.">Reset</button>
      <span id="trainPill" class="pill">Practice: <strong>0</strong></span>
    </div>
  </div>

  <div class="grid">
    <div id="leftCard" class="card"></div>
    <div id="rightCard" class="card"><div id="rightInner"></div></div>
  </div>
</div>

<script>
(() => {
  const LS_MEM_KEY = "dtt_memory_v3";
  const LS_ACTIVE_KEY = "dtt_active_v2";
  const LS_DAY_KEY = "dtt_day_v2";
  const LS_TRAIN_COUNT_KEY = "dtt_train_count_v1";
  const LS_PROGRESS_COUNT_KEY = "cw_progression_full_count_v1";
  const LS_FULL_STREAK_KEY = "dtt_full_streak_v1";
  const LS_PRACTICE_MODE_KEY = "cw_practice_mode_v1";
  const LS_TRAINING_STYLE_KEY = "cw_training_style_v1";
  const LS_KB_ONLY_KEY = "cw_kb_only_v1";
  const LS_HYPERTROPHY_QUEUE_KEY = "cw_hypertrophy_queue_v1";
  const LS_BELL_LEVEL_KEY = "cw_bell_level_v1";
  const LS_ZEN_SECONDS_KEY = "wotb_zen_seconds_v1";
  const LS_LESSON_DAY_KEY = "cw_lesson_day_v2";
  const LS_LESSON_TODAY_KEY = "cw_lesson_today_v2";
  const LS_EXERCISE_SETTINGS_KEY = "wotb_exercise_settings_v1";

  const DUR = { carrySec: 5*60, zone2Sec: 20*60, mobilitySec: 25*60 };

  const EXTRA_POOLS = {
    core: [
      "Crunch",
      "Reverse Crunch",
      "Side Bend",
      "Half-Kneeling Windmill",
      "Wood Chopper"
    ],
    hypertrophy: [
      "Bicep Curl",
      "Tricep Extension",
      "Lateral Raise",
      "Rear Delt Fly",
      "Calf Raise"
    ]
  };

  const LIB = {
    squat: { label:"Squat", subcats:{
      symmetric:{ label:"Symmetric", exercises:["Goblet Squat","Double Front Squat","Hack Squat"] },
      asymmetric:{ label:"Asymmetric", exercises:["Reverse Lunge","Side Lunge / Cossack","Bulgarian Split Squat"] },
      singleleg:{ label:"Single Leg", exercises:["Step-up","Skater Squat","Box Pistol"] },
    }},
    hinge: { label:"Hinge", subcats:{
      deadlift:{ label:"Deadlift", exercises:["Single-Leg Deadlift","B-Stance Deadlift","Double Sumo Deadlift"] },
      hipthrust:{ label:"Hip Thrust", exercises:["Hip Thrust","B-Stance Hip Thrust","Single-Leg Hip Thrust"] },
      ballistic:{ label:"Ballistic", exercises:["One-Arm Swing","Two-Arm Swing","Hand-to-Hand Swing"] },
    }},
    push: { label:"Push", subcats:{
      horizontal:{ label:"Horizontal", exercises:["Bridge Floor Press","Push-up","Get-Up Sit-Up"] },
      vertical:{ label:"Vertical", exercises:["Military Press","Half-Kneeling Press","Top-Down Press"] },
      ballistic:{ label:"Ballistic", exercises:["Double Push Press","Push Jerk","Viking Push Press"] },
    }},
    pull: { label:"Pull", subcats:{
      horizontal:{ label:"Horizontal", exercises:["Wide Row","Small Row","Gorilla Row"] },
      vertical:{ label:"Vertical", exercises:["Chin-up","Pull-up","False-Grip Pull-up"] },
      ballistic:{ label:"Ballistic", exercises:["Double Clean","Snatch","High Pull"] },
    }}
  };

  const CARRIES = ["Suitcase Carry","Front Rack Carry","Overhead Carry","Front Rack March","Cook Drill March","Get-Up"];

  const MOBILITY = [
    { kind:"time", label:"Arm Bar", value:"30s" },
    { kind:"reps", label:"Bent Arm Bar", value:"2/3" },
    { kind:"reps", label:"Rib Pull", value:"3/5" },
    { kind:"reps", label:"Bretzel", value:"3/5" },
    { kind:"reps", label:"Windmill", value:"3/5" },
    { kind:"reps", label:"Bent Press", value:"3/3" },
    { kind:"reps", label:"Pump Stretch", value:"5/10" },
    { kind:"reps", label:"Tactical Frog", value:"5/10" },
    { kind:"reps", label:"CatCow", value:"5/10" },
    { kind:"reps", label:"Overhead Hip Flexor Stretch", value:"10" },
    { kind:"reps", label:"Prying Goblet Squat", value:"5" },
    { kind:"reps", label:"Cossack Squat", value:"3/5" },
    { kind:"reps", label:"Goodmorning Hamstring Stretch", value:"5/10" },
    { kind:"reps", label:"Kettlebell Pull over", value:"5/10" },
    { kind:"reps", label:"Get Up High Bridge", value:"3/5" },
    { kind:"reps", label:"Tall kneeling Halo", value:"5" },
    { kind:"reps", label:"Tall Kneeling Rotations", value:"3" },
  ];

  const leftCard = document.getElementById("leftCard");
  const rightInner = document.getElementById("rightInner");
  const btnMain = document.getElementById("btnMain");
  const btnInstall = document.getElementById("btnInstall");

  function initTrainPillEditor(){
    const el = document.getElementById("trainPill");
    if(!el || el.dataset.longpressBound === "1") return;
    el.dataset.longpressBound = "1";

    let pressTimer = null;
    let longPressTriggered = false;

    const clearPressTimer = () => {
      if(pressTimer){
        clearTimeout(pressTimer);
        pressTimer = null;
      }
    };

    const openCountEditor = () => {
      longPressTriggered = true;
      const current = (loadTrainCount().n || 0);
      const raw = window.prompt("Set Practice counter (0-999):", String(current));
      if(raw === null) return;
      const parsed = Number(raw);
      if(!Number.isFinite(parsed)) return;
      const next = Math.max(0, Math.min(999, Math.round(parsed)));
      const tc = loadTrainCount();
      tc.n = next;
      saveTrainCount(tc);
      updateTrainPill();
      try{ maybeShowCheckpoint(); }catch{}
    };

    const startPress = () => {
      clearPressTimer();
      longPressTriggered = false;
      pressTimer = setTimeout(openCountEditor, 700);
    };

    const endPress = (e) => {
      if(longPressTriggered && e){
        e.preventDefault();
        e.stopPropagation();
      }
      clearPressTimer();
      setTimeout(() => { longPressTriggered = false; }, 0);
    };

    el.addEventListener("touchstart", startPress, { passive: true });
    el.addEventListener("touchend", endPress);
    el.addEventListener("touchcancel", endPress);
    el.addEventListener("mousedown", startPress);
    el.addEventListener("mouseup", endPress);
    el.addEventListener("mouseleave", endPress);
    el.addEventListener("contextmenu", (e) => e.preventDefault());
  }

  // -------------------------
  // Beep
  // -------------------------
  function beep(times=3){
    try{
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      const ctx = new AudioContext();
      const now = ctx.currentTime;
      for(let i=0;i<times;i++){
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.value = i % 2 === 0 ? 880 : 1320;
        gain.gain.setValueAtTime(0.0001, now + i*0.28);
        gain.gain.exponentialRampToValueAtTime(0.85, now + i*0.28 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + i*0.28 + 0.22);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(now + i*0.28);
        osc.stop(now + i*0.28 + 0.22);
      }
      setTimeout(() => ctx.close(), times * 280 + 500);
    }catch{}
  }

  function makeTimer(totalSeconds, onTick){
    return {
      total: totalSeconds,
      left: totalSeconds,
      running: false,
      _t: null,
      _endAt: null,
      _persistTick: onTick,
      _notify(){
        const f = this._onTick || onTick;
        f && f(this.left, this.total);
      },
      sync(){
        if(this.running && this._endAt){
          this.left = Math.max(0, Math.ceil((this._endAt - Date.now()) / 1000));
        }
        this._notify();
      },
      start(onDone){
        if(this.running) return;
        this.running = true;
        this._endAt = Date.now() + (Math.max(0, this.left) * 1000);
        const tick = () => {
          if(!this.running) return;
          this.left = Math.max(0, Math.ceil((this._endAt - Date.now()) / 1000));
          this._notify();
          if(this.left <= 0){
            this.running=false; this._t=null;
            try{ onDone && onDone(); }catch{}
            return;
          }
          const nextDelay = Math.max(250, Math.min(1000, this._endAt - Date.now() - ((this.left - 1) * 1000)));
          this._t = setTimeout(tick, nextDelay);
        };
        tick();
      },
      pause(){ this.sync(); this.running=false; this._endAt=null; if(this._t) clearTimeout(this._t); this._t=null; },
      reset(){ this.pause(); this.left=this.total; this._notify(); },
      setTotal(totalSeconds){ this.pause(); this.total=totalSeconds; this.left=totalSeconds; this._notify(); },
    };
  }

  // -------------------------
  // Memory model for generation
  // -------------------------
  function defaultMemory(){
    const mem = {
      lastCarry:null,
      nextExtraType:"core",
      lastExtraByType:{ core:null, hypertrophy:null },
      extraBags:{ core:[], hypertrophy:[] },
      patterns:{}
    };
    for(const p of Object.keys(LIB)){
      mem.patterns[p] = { lastSubcat:null, lastExerciseBySubcat:{}, subcatBag:[], exerciseBags:{} };
      for(const sc of Object.keys(LIB[p].subcats)){
        mem.patterns[p].lastExerciseBySubcat[sc] = null;
        mem.patterns[p].exerciseBags[sc] = [];
      }
    }
    return mem;
  }
  function loadMemory(){
    const parsed = loadJSON(LS_MEM_KEY);
    if(!parsed) return defaultMemory();
    const mem = defaultMemory();
    try{
      if(parsed.lastCarry) mem.lastCarry = parsed.lastCarry;
      if(parsed.nextExtraType === "core" || parsed.nextExtraType === "hypertrophy"){
        mem.nextExtraType = parsed.nextExtraType;
      }
      for(const type of Object.keys(EXTRA_POOLS)){
        const pool = getExtraPool(type);
        if(parsed.lastExtraByType && pool.includes(parsed.lastExtraByType[type])){
          mem.lastExtraByType[type] = parsed.lastExtraByType[type];
        }
        if(parsed.extraBags && Array.isArray(parsed.extraBags[type])){
          mem.extraBags[type] = parsed.extraBags[type].filter(ex => pool.includes(ex));
        }
      }
      if(parsed.patterns){
        for(const p of Object.keys(LIB)){
          if(parsed.patterns[p]){
            mem.patterns[p].lastSubcat = parsed.patterns[p].lastSubcat ?? null;
            if(Array.isArray(parsed.patterns[p].subcatBag)){

  function randInt(n){ return Math.floor(Math.random()*n); }
  function choice(arr){ return arr[randInt(arr.length)]; }
  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = randInt(i+1);
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  function refillSubcategoryBag(patternKey, mem){
    const settings = loadExerciseSettings();
    const subcats = Object.keys(LIB[patternKey].subcats).filter(sc => availableFrom(LIB[patternKey].subcats[sc].exercises, settings).length);
    if(!subcats.length){
      subcats.push(...Object.keys(LIB[patternKey].subcats));
    }
    const last = mem.patterns[patternKey].lastSubcat;
    let bag = shuffle(subcats);

    if(last && bag.length > 1 && bag[0] === last){
      const swapIdx = bag.findIndex(sc => sc !== last);
      if(swapIdx > 0){
        [bag[0], bag[swapIdx]] = [bag[swapIdx], bag[0]];
      }
    }

    mem.patterns[patternKey].subcatBag = bag;
  }

  function pickSubcategory(patternKey, mem){
    const patternMem = mem.patterns[patternKey];
    const settings = loadExerciseSettings();
    let subcats = Object.keys(LIB[patternKey].subcats).filter(sc => availableFrom(LIB[patternKey].subcats[sc].exercises, settings).length);
    if(!subcats.length) subcats = Object.keys(LIB[patternKey].subcats);
    if(!patternMem.subcatBag || !patternMem.subcatBag.length){
      refillSubcategoryBag(patternKey, mem);
    }

    let bag = patternMem.subcatBag.filter(sc => subcats.includes(sc));
    const last = patternMem.lastSubcat;

    if(!bag.length){
      refillSubcategoryBag(patternKey, mem);
      bag = patternMem.subcatBag;
    }

    if(last && bag.length > 1 && bag[0] === last){
      const swapIdx = bag.findIndex(sc => sc !== last);
      if(swapIdx > 0){
        [bag[0], bag[swapIdx]] = [bag[swapIdx], bag[0]];
      }
    }

    let picked = bag.shift();

    if(last && picked === last){
      const fallback = subcats.find(sc => sc !== last);
      if(fallback){
        picked = fallback;
        const idx = bag.indexOf(fallback);
        if(idx >= 0) bag.splice(idx, 1);
      }
    }

    patternMem.subcatBag = bag;
    return picked;
  }

  function refillExerciseBag(patternKey, subcatKey, mem){
    const settings = loadExerciseSettings();
    let exList = availableFrom(LIB[patternKey].subcats[subcatKey].exercises, settings);
    if(!exList.length){
      exList = LIB[patternKey].subcats[subcatKey].exercises.slice();
    }
    const lastEx = mem.patterns[patternKey].lastExerciseBySubcat[subcatKey];
    let bag = shuffle(exList);

    if(lastEx && bag.length > 1 && bag[0] === lastEx){
      const swapIdx = bag.findIndex(x => x !== lastEx);
      if(swapIdx > 0){
        [bag[0], bag[swapIdx]] = [bag[swapIdx], bag[0]];
      }
    }

    mem.patterns[patternKey].exerciseBags[subcatKey] = bag;
  }

  function pickExercise(patternKey, subcatKey, mem){
    const patternMem = mem.patterns[patternKey];
    const settings = loadExerciseSettings();
    let exList = availableFrom(LIB[patternKey].subcats[subcatKey].exercises, settings);
    if(!exList.length){
      exList = LIB[patternKey].subcats[subcatKey].exercises.slice();
    }
    if(!patternMem.exerciseBags[subcatKey] || !patternMem.exerciseBags[subcatKey].length){
      refillExerciseBag(patternKey, subcatKey, mem);
    }

    let bag = patternMem.exerciseBags[subcatKey].filter(ex => exList.includes(ex));
    const lastEx = patternMem.lastExerciseBySubcat[subcatKey];

    if(!bag.length){
      refillExerciseBag(patternKey, subcatKey, mem);
      bag = patternMem.exerciseBags[subcatKey];
    }

    if(lastEx && bag.length > 1 && bag[0] === lastEx){
      const swapIdx = bag.findIndex(x => x !== lastEx);
      if(swapIdx > 0){
        [bag[0], bag[swapIdx]] = [bag[swapIdx], bag[0]];
      }
    }

    let picked = bag.shift();

    if(lastEx && picked === lastEx){
      const fallback = exList.find(x => x !== lastEx);
      if(fallback){
        picked = fallback;
        const idx = bag.indexOf(fallback);
        if(idx >= 0) bag.splice(idx, 1);
      }
    }

    patternMem.exerciseBags[subcatKey] = bag;
    return picked;
  }

  function refillExtraBag(type, mem){
    const settings = loadExerciseSettings();
    const fullPool = getExtraPool(type);
    const available = availableFrom(fullPool, settings);
    const pool = available.length ? available : fullPool;
    const last = mem.lastExtraByType[type];
    let bag = shuffle(pool);

    if(last && bag.length > 1 && bag[0] === last){
      const swapIdx = bag.findIndex(ex => ex !== last);
      if(swapIdx > 0){
        [bag[0], bag[swapIdx]] = [bag[swapIdx], bag[0]];
      }
    }

    mem.extraBags[type] = bag;
  }

  function pickExtra(type, mem){
    const settings = loadExerciseSettings();
    const fullPool = getExtraPool(type);
    const available = availableFrom(fullPool, settings);
    const pool = available.length ? available : fullPool;
    if(!mem.extraBags[type] || !mem.extraBags[type].length){
      refillExtraBag(type, mem);
    }

    let bag = mem.extraBags[type].filter(ex => pool.includes(ex));
    const last = mem.lastExtraByType[type];

    if(!bag.length){
      refillExtraBag(type, mem);
      bag = mem.extraBags[type];
    }

    if(last && bag.length > 1 && bag[0] === last){
      const swapIdx = bag.findIndex(ex => ex !== last);
      if(swapIdx > 0){
        [bag[0], bag[swapIdx]] = [bag[swapIdx], bag[0]];
      }
    }

    const picked = bag.shift();
    mem.extraBags[type] = bag;
    mem.lastExtraByType[type] = picked;
    return picked;
  }

  function ladderFor(item, mode){
    const ex = (item.baseExercise || item.exercise || "").toLowerCase();
    const isDouble = ex.includes("double");
    const isBallistic = (item.subcatKey === "ballistic");

    let ladder = "2-3-5";
    if(isBallistic && isDouble) ladder = "4-6-10";
    else if(isBallistic) ladder = "5-10-15";

    if(mode === "MINI"){
      if(ladder === "2-3-5") return "2-3-4";
      if(ladder === "5-10-15") return "5-7-8";
      if(ladder === "4-6-10") return "2-4-6";
    }
    return ladder;
  }

  function applyKettlebellOnlyReplacement(subcatKey, exercise){
    if(!getKettlebellOnly() || subcatKey !== "vertical") return exercise;
    if(exercise === "Chin-up") return "Kettlebell Pull over";
    if(exercise === "Pull-up") return "Kettlebell Halo";
    if(exercise === "False-Grip Pull-up") return "Tall Kneeling Halo";
    return exercise;
  }

  function generateSession(mode = "MINI"){
    const mem = loadMemory();
    const exerciseSettings = loadExerciseSettings();
    const picks = [];
    const hypoState = loadHypertrophyState();
    const hypertrophyPattern = hypoState.current;
    let hypertrophyApplied = false;
    for(const patternKey of ["squat","hinge","push","pull"]){
      const subcatKey = pickSubcategory(patternKey, mem);
      const rawEx = pickExercise(patternKey, subcatKey, mem);
      const baseEx = patternKey === "pull" ? applyKettlebellOnlyReplacement(subcatKey, rawEx) : rawEx;
      const ex = customExerciseName(baseEx, exerciseSettings);
      picks.push({
        patternKey,
        patternLabel: LIB[patternKey].label,
        subcatKey,
        subcatLabel: LIB[patternKey].subcats[subcatKey].label,
        baseExercise: baseEx,
        exercise: ex
      });
      mem.patterns[patternKey].lastSubcat = subcatKey;
      mem.patterns[patternKey].lastExerciseBySubcat[subcatKey] = rawEx;
    }

    if(getTrainingStyle() === "hybrid"){
      for(const item of picks){
        if(item.patternKey !== hypertrophyPattern) continue;
        if(!isBallistic(item.subcatKey) && !isBallisticExtraExercise(item.baseExercise || item.exercise)){
          item.hypertrophy = true;
          hypertrophyApplied = true;
        }
        break;
      }
    }

    if(hypertrophyApplied){
      advanceHypertrophy(hypoState);
    }

    let optional = null;
    let optionalBase = null;
    let optionalType = null;
    if(mode === "FULL"){
      optionalType = mem.nextExtraType === "hypertrophy" ? "hypertrophy" : "core";
      optionalBase = pickExtra(optionalType, mem);
      optional = customExerciseName(optionalBase, exerciseSettings);
      mem.nextExtraType = optionalType === "core" ? "hypertrophy" : "core";
    }

    const circuit = shuffle(picks);
    const availableCarries = availableFrom(CARRIES, exerciseSettings);
    const carryPool = availableCarries.length ? availableCarries : CARRIES;
    const carryAllowed = carryPool.filter(c => c !== mem.lastCarry);
    const carryBase = choice(carryAllowed.length ? carryAllowed : carryPool);
    const carry = customExerciseName(carryBase, exerciseSettings);
    mem.lastCarry = carryBase;
    return { circuit, carry, carryBase, optional, optionalBase, optionalType, memNext: mem };
  }

  const confCanvas = document.getElementById('confettiCanvas');
  const confCtx = confCanvas.getContext('2d');
  function confettiBurst(ms=1400){
    const w = confCanvas.width = window.innerWidth;
    const h = confCanvas.height = window.innerHeight;
    confCanvas.style.display = 'block';
    const pieces = Array.from({length: 160}, () => ({
      x: Math.random()*w,
      y: -20 - Math.random()*h*0.2,
      vx: (Math.random()*2-1)*6,
      vy: 3 + Math.random()*8,
      s: 4 + Math.random()*6,
      r: Math.random()*Math.PI*2,
      vr: (Math.random()*2-1)*0.2,
      a: 1,
    }));
    const start = performance.now();
    const draw = (t) => {
      const elapsed = t - start;
      confCtx.clearRect(0,0,w,h);
      for(const p of pieces){
        p.x += p.vx;
        p.y += p.vy;
        p.r += p.vr;
        p.vy *= 0.99;
        p.vx *= 0.995;
        if(elapsed > ms*0.6) p.a = Math.max(0, 1 - (elapsed - ms*0.6) / (ms*0.4));
        confCtx.save();
        confCtx.globalAlpha = p.a;
        confCtx.translate(p.x,p.y);
        confCtx.rotate(p.r);
        // no fixed colors: use varying grayscale + accent tint
        const shade = 180 + Math.floor(Math.random()*60);
        confCtx.fillStyle = `rgba(${shade},${shade},${shade},${p.a})`;
        confCtx.fillRect(-p.s/2, -p.s/2, p.s, p.s*0.6);
        confCtx.restore();
      }
      if(elapsed < ms){ requestAnimationFrame(draw); }
      else { confCtx.clearRect(0,0,w,h); confCanvas.style.display='none'; }
    };
    requestAnimationFrame(draw);
  }

    if(!t){ timeEl.textContent = "--:--"; return; }

      timeEl.textContent = fmt(left);

      sub.textContent = `${pct}%`;
      if(t._persistTick) t._persistTick(left, total);

      if(timerId === 'walk' || timerId === 'mobility'){
        // no wakelock
      } else {
        requestWakeLock();

      t.start(() => {
        beep(4);
        // Auto-chaining:

          if(active && active.mode === 'MINI' && typeof startZone2 === 'function') startZone2(true);

      if(timerId !== 'walk' && timerId !== 'mobility') releaseWakeLock();
      persistActive();
    });
    document.getElementById('btnResetT').addEventListener('click', () => {
      t.reset();
      if(timerId !== 'walk' && timerId !== 'mobility') releaseWakeLock();
      persistActive();
    });

  const gateDef = [

function computeBand(total){
    if(total >= 12) return { band:'GOOD', label:'12-15', cls:'good' };
    if(total >= 8)  return { band:'MID', label:'8-11', cls:'mid' };
    return { band:'REC', label:'0-7', cls:'rec' };
  }

  function applyPracticeRhythm(gateMode, nextSessionNumber){
    if(gateMode === 'RECOVERY') return { mode:'RECOVERY', reason:'gate' };
    const n = Math.max(1, Number(nextSessionNumber) || 1);
    if(n % 8 === 0) return { mode:'RECOVERY', reason:'rhythm-recovery' };
    if(n % 4 === 0) return { mode:'MINI', reason:'rhythm-mini' };
    return { mode:gateMode, reason:null };
  }

  function countCompletedPracticeSession(sessionNumber){
    const tc = loadTrainCount();
    const current = tc.n || 0;
    tc.n = Math.max(current, Number(sessionNumber) || current);
    saveTrainCount(tc);
    updateTrainPill();
  }

  function nextProgressionTrainingNumber(mode, practiceMode){
    if(practiceMode !== "progression") return null;
    if(!(mode === "FULL" || mode === "MINI")) return null;
    return (loadProgressCount().n || 0) + 1;
  }

  function countCompletedProgressionTrainingSession(active){
    if(!active || !(active.mode === "FULL" || active.mode === "MINI")) return;
    if(active.practiceMode !== "progression") return;
    const pc = loadProgressCount();
    pc.n = (pc.n || 0) + 1;

  function renderGate(existing){
    const _raw = existing?.scores ?? { soreness:null, energy:null, sleep:null };
    const scores = { soreness: (_raw.soreness ?? null), energy: (_raw.energy ?? null), sleep: (_raw.sleep ?? null) };

    leftCard.innerHTML = `
      <h2>Recovery Gate</h2>
      <p class="small" style="margin-bottom:14px;">Set the tone for today before choosing the work.</p>
      <div class="gate-grid">
        ${gateDef.map(g => `
          <div class="gate-row">

            </div>
            <div class="score-label" id="lbl-${g.key}">-</div>
          </div>
        `).join('')}

          <div>
            <div class="label">Total</div>
            <div class="n" id="totalN">0</div>
          </div>
          <div id="band" class="badge">-</div>
        </div>
        <div class="row">
          <button id="btnStartSession" class="btn primary" disabled>Build Practice</button>
          <span class="small">(after filling all 3 scores)</span>
        </div>
      </div>
    `;

    const totalEl = document.getElementById('totalN');
    const bandEl = document.getElementById('band');
    const btnStart = document.getElementById('btnStartSession');

    function updateUI(){
      const vals = Object.values(scores);
      const complete = vals.every(v => typeof v === 'number');
      const total = vals.reduce((a,b) => a + (typeof b==='number'?b:0), 0);
      totalEl.textContent = String(total);
      const b = computeBand(total);
      bandEl.className = `badge ${b.cls}`;
      bandEl.textContent = b.label;
      // update selected text labels
      gateDef.forEach(g => {
        const v = scores[g.key];
        const el = document.getElementById(`lbl-${g.key}`);
        if(!el) return;
        if(typeof v === 'number') el.textContent = g.choices[v] ?? '-';
        else el.textContent = '-';
      });
      btnStart.disabled = !complete;
    }

    // restore active styles
    document.querySelectorAll('.score-row').forEach(row => {
      const key = row.dataset.gkey;
      const val = scores[key];
      row.querySelectorAll('.score-btn').forEach(btn => {
        if(val !== null && Number(btn.dataset.score) === val) btn.classList.add('active');
      });
    });

    document.querySelectorAll('.score-row').forEach(row => {
      row.addEventListener('click', (e) => {
        const t = e.target;
        if(!t.classList.contains('score-btn')) return;
        const key = row.dataset.gkey;
        const v = Number(t.dataset.score);
        scores[key] = v;
        row.querySelectorAll('.score-btn').forEach(b => b.classList.remove('active'));
        t.classList.add('active');
        updateUI();
      });
    });

    btnStart.addEventListener('click', () => {
      const total = Object.values(scores).reduce((a,b)=>a+b,0);
      const band = computeBand(total).band;
      const gateMode = (band === 'GOOD') ? 'FULL' : (band === 'MID') ? 'MINI' : 'RECOVERY';
      const tc = loadTrainCount();
      const sessionNumber = (tc.n || 0) + 1;
      const rhythm = applyPracticeRhythm(gateMode, sessionNumber);
      const mode = rhythm.mode;
      const practiceMode = getPracticeMode();
      const trainingNumber = nextProgressionTrainingNumber(mode, practiceMode);

      // lock gate for today
      saveDayState({ day: todayKey(), scores, total, modeLocked: mode, rhythmReason: rhythm.reason, sessionNumber, trainingNumber });

      // create active state
      if(mode === 'FULL' || mode === 'MINI'){
        const s = generateSession(mode);
          // save memory and count immediately on generation
          saveMemory(s.memNext);
          const trainingStyle = getTrainingStyle();
        saveActive({ day: todayKey(), mode, phase:'TRAINING', session:s, practiceMode, trainingStyle, sessionNumber, trainingNumber, timers:{
          circuitLeft: getCircuitSeconds(mode, practiceMode, trainingNumber),
          carryLeft: mode === 'FULL' ? DUR.carrySec : undefined,
          zone2Left: mode === 'MINI' ? DUR.zone2Sec : undefined,
        }});
      } else {
        saveActive({ day: todayKey(), mode, phase:'MOBILITY', sessionNumber, timers:{ mobilityLeft: DUR.mobilitySec }, mobilityChecks: {} });
      }

      boot();
    });

    updateUI();
    renderRightNone();
    // If you hit 60 training sessions, show the bell-up checkpoint once.
    try{ maybeShowCheckpoint(); }catch{}

  const breathSeq = [
    { phase:'IN', sec:3, scale:1.20 },
    { phase:'HOLD', sec:1, scale:1.20 },
    { phase:'OUT', sec:6, scale:0.80 },
    { phase:'HOLD', sec:2, scale:0.80 },
  ];

  function renderBreathing(active){
    leftCard.innerHTML = `
      <h2>Breathing (3-1-6-2)</h2>
      <div class="breathBox">
        <div class="ring">
          <div class="ringInner" id="ringInner">
            <div>
              <div class="phase" id="phaseTxt">IN</div>
              <div class="phaseSub" id="phaseSub">3s</div>
            </div>
          </div>
        </div>
        <div class="progress"><div id="prog"></div></div>
        <div class="small" id="totalLeft">-</div>
      </div>
      <div class="hr"></div>
      <div class="row">
        <button id="btnBack" class="btn">Back</button>
        <button id="btnFinish" class="btn danger">Finish session</button>
      </div>
    `;

    const ringInner = document.getElementById('ringInner');
    const phaseTxt = document.getElementById('phaseTxt');
    const phaseSub = document.getElementById('phaseSub');
    const prog = document.getElementById('prog');
    const totalLeft = document.getElementById('totalLeft');

    function setPhase(p){
      phaseTxt.textContent = p.phase;
      ringInner.style.transform = `scale(${p.scale})`;
    }

    // Initialize from active
    const total = active.timers.breathTotal ?? (active.timers.breathTotal = (active.timers.breathLeft ?? 300));
    const breathCycleSec = breathSeq.reduce((sum, p) => sum + p.sec, 0);
    let lastBreathPhase = active.timers.breathPhase || 'IN';

    function syncBreathPhase(a, allowBeep=false){
      a.timers = a.timers || {};
      const left = Math.max(0, a.timers.breathLeft ?? total);
      const elapsed = Math.max(0, total - left);
      let cyclePos = breathCycleSec ? elapsed % breathCycleSec : 0;
      let phase = breathSeq[0];
      for(const candidate of breathSeq){
        if(cyclePos < candidate.sec){
          phase = candidate;
          break;
        }
        cyclePos -= candidate.sec;
      }

      const nextLeft = Math.max(1, phase.sec - Math.floor(cyclePos));
      const changed = a.timers.breathPhase && a.timers.breathPhase !== phase.phase;
      a.timers.breathPhase = phase.phase;
      a.timers.breathPhaseLeft = nextLeft;
      a.timers.breathPhaseSec = phase.sec;

      if(allowBeep && changed && lastBreathPhase !== phase.phase){
        beep(1);
      }
      lastBreathPhase = phase.phase;
      return phase;
    }

    function updateUI(){
      const a = loadActive();
      if(!a) return;
      const phase = syncBreathPhase(a, false);
      saveActive(a);
      const left = a.timers.breathLeft;
      const pct = total ? (1 - left/total) * 100 : 0;
      prog.style.width = `${Math.max(0, Math.min(100, pct))}%`;
      totalLeft.textContent = `${fmt(left)} left`;
      phaseTxt.textContent = a.timers.breathPhase;
      phaseSub.textContent = `${a.timers.breathPhaseLeft}s`;
      ringInner.style.transform = `scale(${phase.scale})`;
    }

    // Breathing timer is custom (phase-based)
    if(timers.breathing) timers.breathing.pause();

    timers.breathing = makeTimer(active.timers.breathLeft ?? 300, (left, totalIgnored) => {
      const a = loadActive();
      if(!a) return;
      a.timers.breathLeft = left;
      syncBreathPhase(a, timers.breathing && timers.breathing.running);
      saveActive(a);
      updateUI();
    });
    timers.breathing.left = Math.max(0, active.timers.breathLeft ?? 300);

    // Right panel for breathing uses timers.breathing (start/pause/reset), but with wakelock
    renderRightTimer('Breathing', 'breathing');
    setModePill('-');

    // Patch the right panel buttons to also control wakelock
    const startBtn = rightInner.querySelector('#btnStart');
    const pauseBtn = rightInner.querySelector('#btnPause');
    const resetBtn = rightInner.querySelector('#btnResetT');

    startBtn.addEventListener('click', () => {
      requestWakeLock();
      const a = loadActive();
      if(!a) return;
      // if no phase init
      if(!a.timers.breathPhase){ a.timers.breathPhase = 'IN'; a.timers.breathPhaseLeft = 3; }
      syncBreathPhase(a, false);
      saveActive(a);
    }, { once:false });

    pauseBtn.addEventListener('click', () => {
      // pause already handled by renderRightTimer
      releaseWakeLock();
    }, { once:false });

    resetBtn.addEventListener('click', () => {
      const a = loadActive();
      if(!a) return;
      a.timers.breathLeft = a.timers.breathTotal ?? (a.timers.breathTotal = (a.timers.breathLeft ?? 300));
      a.timers.breathPhase = 'IN';
      a.timers.breathPhaseLeft = 3;
      a.timers.breathPhaseSec = 3;
      saveActive(a);
      timers.breathing.reset();
      releaseWakeLock();
      updateUI();
    }, { once:false });

    // bootstrap phase visuals
    const a0 = loadActive();
    if(a0 && !a0.timers.breathPhase){
      a0.timers.breathPhase = 'IN';
      a0.timers.breathPhaseLeft = 3;
      a0.timers.breathPhaseSec = 3;
      saveActive(a0);
    }
    updateUI();

    document.getElementById('btnBack').addEventListener('click', () => {
      releaseWakeLock();
      const a = loadActive();
      if(a){ a.phase = 'MOBILITY'; saveActive(a); }
      boot();
    });
    document.getElementById('btnFinish').addEventListener('click', () => {
      releaseWakeLock();
      completeSession();
    });

    // ensure no wakelock until user starts
    releaseWakeLock();
  }

  function completeSession(){
    const a = loadActive();
    // summary line for completion screen
    let summaryLine = "Nice. A new gate tomorrow.";

    if(a && (a.mode === 'FULL' || a.mode === 'MINI') && a.session && a.session.memNext){
    }

    if(a && typeof a.sessionNumber === 'number'){
      countCompletedPracticeSession(a.sessionNumber);
      countCompletedProgressionTrainingSession(a);
    }

    // If today's session was not FULL/MINI training, break FULL streak
    if(a && !(a.mode === 'FULL' || a.mode === 'MINI')){
      const fs = loadFullStreak();
      fs.n = 0;
      saveFullStreak(fs);
      summaryLine = "Recovery session complete.";
    }

    clearActive();
    // keep day state locked until tomorrow OR user resets; this matches your idea
    // (If you want unlock on finish, uncomment next line)
    // localStorage.removeItem(LS_DAY_KEY);

    // Stop timers and wakelock
    Object.values(timers).forEach(t => { try{ t && t.pause && t.pause(); }catch{} });
    releaseWakeLock();

    confettiBurst();
    btnMain.textContent = 'Options';
    btnMain.classList.add('main-action');
    setModePill("-");

    if(a){
      const fs = loadFullStreak();
      if(a.mode === 'FULL'){
        fs.n = (fs.n || 0) + 1;
      } else {
        fs.n = 0;
      }
      saveFullStreak(fs);
    }
    // Show summary screen
    leftCard.innerHTML = `

      <p class="small">${summaryLine}</p>
      <div class="hr"></div>
      <button id="btnHome" class="btn primary">Back to start</button>

  // -------------------------

  // -------------------------
  function boot(){
    updateTrainPill();
    updateKettlebellOnlyPill();
    initTrainPillEditor();
    
    const day = loadDayState();
    const active = loadActive();

    if(active){
      btnMain.textContent = 'Options';
      // route by phase
      if(active.phase === 'TRAINING') return renderTraining(active);
      if(active.phase === 'MOBILITY')  return renderMobility(active);
      if(active.phase === 'WALK')      return renderWalk(active);
      if(active.phase === 'BREATHING') return renderBreathing(active);
    }

    // if day gate is filled but no active session (user decided not to train)
    if(day && day.modeLocked){
      btnMain.textContent = 'Options';
      leftCard.innerHTML = `
        <h2>Gate completed (${day.total}/15)</h2>
        <p class="small">You have already set today's gate. You can open your session or reset today.</p>
        <div class="hr"></div>
        <div class="row">
          <button id="btnStartFromLock" class="btn primary">Open Practice</button>
          <button id="btnResetDay" class="btn danger">Reset today</button>
        </div>
      `;
      renderRightNone();
    // If you hit 60 training sessions, show the bell-up checkpoint once.
    try{ maybeShowCheckpoint(); }catch{}

      setModePill(day.modeLocked);

      document.getElementById('btnStartFromLock').addEventListener('click', () => {
        // create active based on locked mode
        const mode = day.modeLocked;
        const sessionNumber = day.sessionNumber || ((loadTrainCount().n || 0) + 1);
        const practiceMode = getPracticeMode();
        const trainingNumber = day.trainingNumber || nextProgressionTrainingNumber(mode, practiceMode);
        if(mode === 'FULL' || mode === 'MINI'){
          const s = generateSession(mode);
          // save memory and count immediately on generation
          saveMemory(s.memNext);
          const trainingStyle = getTrainingStyle();
          saveActive({ day: todayKey(), mode, phase:'TRAINING', session:s, practiceMode, trainingStyle, sessionNumber, trainingNumber, timers:{
            circuitLeft: getCircuitSeconds(mode, practiceMode, trainingNumber),
            carryLeft: mode === 'FULL' ? DUR.carrySec : undefined,
            zone2Left: mode === 'MINI' ? DUR.zone2Sec : undefined,
          }});
        } else {
          saveActive({ day: todayKey(), mode, phase:'MOBILITY', sessionNumber, timers:{ mobilityLeft: DUR.mobilitySec }, mobilityChecks: {} });
        }
        boot();
      });

      document.getElementById('btnResetDay').addEventListener('click', () => {
        localStorage.removeItem(LS_DAY_KEY);
        clearActive();
        boot();
      });
      return;
    }

    // default: gate
    btnMain.textContent = 'Options';
    renderGate(null);
  }

  function forceActiveRecovery(){
    Object.values(timers).forEach(t => { try{ t && t.pause && t.pause(); }catch{} });
    releaseWakeLock();

    const sessionNumber = (loadTrainCount().n || 0) + 1;
    saveDayState({
      day: todayKey(),
      scores: {},
      total: 0,
      modeLocked: "RECOVERY",
      rhythmReason: "manual-active-recovery",
      sessionNumber
    });
    saveActive({
      day: todayKey(),
      mode: "RECOVERY",
      phase: "MOBILITY",
      sessionNumber,
      timers: { mobilityLeft: DUR.mobilitySec },
      mobilityChecks: {}
    });

    closeModal();
    boot();
  }

  function confirmActiveRecovery(){
    openModal({
      title: "Force Active Recovery?",
      text: "This will replace today's current gate/session with Loaded Kettlebell Mobility.",
      actionsHTML: `
        <button id="btnConfirmRecovery" class="btn rec">Start Active Recovery</button>
        <button id="btnCancelRecovery" class="btn">Cancel</button>
      `
    });

    document.getElementById("btnConfirmRecovery").addEventListener("click", () => {
      forceActiveRecovery();
    });
    document.getElementById("btnCancelRecovery").addEventListener("click", () => {
      openPracticeModeSelector();
    });
  }

  function openExerciseAvailability(){
    const settings = loadExerciseSettings();
    const groupsHTML = exerciseAvailabilityGroups().map(group => `
      <details class="availabilityGroup" open>
        <summary>${escapeHTML(group.label)}</summary>
        <div class="availabilitySub">
          ${group.subgroups.map(sub => `
            <div class="availabilitySubTitle">${escapeHTML(sub.label)}</div>
            ${sub.exercises.map(ex => {
              const available = isExerciseAvailable(ex, settings);
              const replacement = settings.replacements?.[ex] || "";
              return `
                <div class="availabilityRow ${available ? "" : "off"}" data-row="${escapeHTML(ex)}">
                  <label class="availabilityToggle">
                    <input type="checkbox" data-availability="${escapeHTML(ex)}"${available ? " checked" : ""}>
                    <span>${escapeHTML(ex)}</span>
                  </label>
                  <input class="availabilityReplacement" type="text" data-replacement="${escapeHTML(ex)}" value="${escapeHTML(replacement)}" placeholder="Optional variation">
                </div>
              `;
            }).join("")}
          `).join("")}
        </div>
      </details>
    `).join("");

    openModal({
      title: "Exercise availability",
      text: "Turn exercises on or off, or give them your own variation name inside the same category.",
      bodyHTML: `<div id="exerciseAvailabilityList" class="availabilityList">${groupsHTML}</div>`,
      actionsHTML: `
        <button id="btnAvailabilityReset" class="btn danger">Reset all</button>
        <button id="btnAvailabilityBack" class="btn primary">Back</button>
      `
    });

    const list = document.getElementById("exerciseAvailabilityList");
    list.addEventListener("change", (event) => {
      const toggle = event.target.closest("[data-availability]");
      if(!toggle) return;
      const name = toggle.getAttribute("data-availability");
      const next = loadExerciseSettings();
      if(toggle.checked) delete next.disabled[name];
      else next.disabled[name] = true;
      saveExerciseSettings(next);
      const row = toggle.closest(".availabilityRow");
      if(row) row.classList.toggle("off", !toggle.checked);
    });

    list.addEventListener("input", (event) => {
      const input = event.target.closest("[data-replacement]");
      if(!input) return;
      const name = input.getAttribute("data-replacement");
      const next = loadExerciseSettings();
      const value = String(input.value || "").trim().slice(0, 80);
      if(value) next.replacements[name] = value;
      else delete next.replacements[name];
      saveExerciseSettings(next);
    });

    document.getElementById("btnAvailabilityReset").addEventListener("click", () => {
      localStorage.removeItem(LS_EXERCISE_SETTINGS_KEY);
      openExerciseAvailability();
    });
    document.getElementById("btnAvailabilityBack").addEventListener("click", () => {
      openPracticeModeSelector();
    });
  }

  function openPracticeModeSelector(){
    const current = getPracticeMode();
    const kbOnly = getKettlebellOnly();
    const trainingStyle = getTrainingStyle();
    const zenSeconds = getZenSeconds();
    const isZen = current === "zen";
    openModal({
      title: "Session settings",
      text: isZen
        ? "Zen uses the normal training structure with your chosen style and a fixed session time."
        : "Progression uses the normal training structure, timed blocks, and 60-session Military Press checks for Strength and Hypertrophy.",
      actionsHTML: `
        <div style="display:grid; gap:12px; width:100%;">
          <div>
            <div class="small" style="margin-bottom:6px;">Mode</div>
            <div class="row">
              <button id="btnModeZen" class="btn ${current === 'zen' ? 'primary' : ''}"${current === "zen" ? ' disabled' : ''}>Zen</button>
              <button id="btnModeProgression" class="btn ${current === 'progression' ? 'good' : ''}"${current === "progression" ? ' disabled' : ''}>Progression</button>
            </div>
          </div>

          ${isZen ? `
            <div>
              <div class="small" style="margin-bottom:6px;">Zen session time</div>
              <div class="row">
                <button id="btnZen20" class="btn ${zenSeconds === 20*60 ? 'primary' : ''}"${zenSeconds === 20*60 ? ' disabled' : ''}>20 min</button>
                <button id="btnZen25" class="btn ${zenSeconds === 25*60 ? 'primary' : ''}"${zenSeconds === 25*60 ? ' disabled' : ''}>25 min</button>
                <button id="btnZen30" class="btn ${zenSeconds === 30*60 ? 'primary' : ''}"${zenSeconds === 30*60 ? ' disabled' : ''}>30 min</button>
              </div>
            </div>
          ` : ``}

          <div>
            <div class="small" style="margin-bottom:6px;">Training style</div>
            <div class="row">
              <button id="btnStyleStrength" class="btn ${trainingStyle === 'strength' ? 'primary' : ''}"${trainingStyle === "strength" ? ' disabled' : ''}>Strength</button>
              <button id="btnStyleHybrid" class="btn ${trainingStyle === 'hybrid' ? 'primary' : ''}"${trainingStyle === "hybrid" ? ' disabled' : ''}>Hybrid</button>
              <button id="btnStyleHypertrophy" class="btn ${trainingStyle === 'hypertrophy' ? 'primary' : ''}"${trainingStyle === "hypertrophy" ? ' disabled' : ''}>Hypertrophy</button>
            </div>
          </div>

          <div>
            <div class="small" style="margin-bottom:6px;">Tools</div>
            <div class="row">
              <button id="btnStartCalibration" class="btn mid">Start Calibration</button>
              <button id="btnKbOnly" class="btn ${kbOnly ? 'good' : ''}">KB Only: ${kbOnly ? 'On' : 'Off'}</button>
              <button id="btnExerciseAvailability" class="btn">Exercise availability</button>
            </div>
          </div>

          <div>
            <div class="small" style="margin-bottom:6px;">Override today</div>
            <div class="row">
              <button id="btnForceRecovery" class="btn rec">Force Active Recovery</button>
              <button id="btnModeCancel" class="btn">Close</button>
            </div>
          </div>
        </div>
      `
    });

    document.getElementById("btnModeZen").addEventListener("click", () => {
      savePracticeMode("zen");
      openPracticeModeSelector();
    });

    document.getElementById("btnModeProgression").addEventListener("click", () => {
      savePracticeMode("progression");
      openPracticeModeSelector();
    });

    const bindZenTime = (id, seconds) => {
      const btn = document.getElementById(id);
      if(!btn) return;
      btn.addEventListener("click", () => {
        saveZenSeconds(seconds);
        openPracticeModeSelector();
      });
    };
    bindZenTime("btnZen20", 20*60);
    bindZenTime("btnZen25", 25*60);
    bindZenTime("btnZen30", 30*60);

    document.getElementById("btnStyleStrength").addEventListener("click", () => {
      saveTrainingStyle("strength");
      openPracticeModeSelector();
    });

    document.getElementById("btnStyleHybrid").addEventListener("click", () => {
      saveTrainingStyle("hybrid");
      openPracticeModeSelector();
    });

    document.getElementById("btnStyleHypertrophy").addEventListener("click", () => {
      saveTrainingStyle("hypertrophy");
      openPracticeModeSelector();
    });

    document.getElementById("btnKbOnly").addEventListener("click", () => {
      saveKettlebellOnly(!getKettlebellOnly());
      openPracticeModeSelector();
    });

    document.getElementById("btnExerciseAvailability").addEventListener("click", () => {
      openExerciseAvailability();
    });

    document.getElementById("btnStartCalibration").addEventListener("click", () => {
      openStartCalibration();
    });

    document.getElementById("btnForceRecovery").addEventListener("click", () => {
      confirmActiveRecovery();
    });

    document.getElementById("btnModeCancel").addEventListener("click", () => closeModal());
  }

  // -------------------------
  // Main button
  // -------------------------
  btnMain.addEventListener('click', (e) => {
    if(appModal && appModal.classList.contains("show")) return;
    openPracticeModeSelector();
  });

  // Reset button (confirm)
  btnReset.addEventListener('click', () => {
    openModal({
      title: "Program reset",
      text: "This clears selection memory, the active session, today's gate, training style, KB Only, hypertrophy rotation, and your Practice counter.",
      bodyHTML: "",
      actionsHTML: `
        <button id="btnDoReset" class="btn danger">Reset</button>
        <button id="btnCancelReset" class="btn">Cancel</button>
      `
    });

    document.getElementById("btnCancelReset").addEventListener("click", () => closeModal());

    // 2-tap safety
    const btn = document.getElementById("btnDoReset");
    let armed = false;
    btn.textContent = "Tap again to confirm";
    btn.classList.remove("danger");
    btn.classList.add("mid");

    btn.addEventListener("click", () => {
      if(!armed){
        armed = true;
        btn.textContent = "Confirm reset";
        btn.classList.remove("mid");
        btn.classList.add("danger");
        return;
      }
      localStorage.removeItem(LS_MEM_KEY);
      localStorage.removeItem(LS_ACTIVE_KEY);
      localStorage.removeItem(LS_DAY_KEY);
      localStorage.removeItem(LS_TRAIN_COUNT_KEY);
      localStorage.removeItem(LS_PROGRESS_COUNT_KEY);
      localStorage.removeItem(LS_FULL_STREAK_KEY);
      localStorage.removeItem(LS_TRAINING_STYLE_KEY);
      localStorage.removeItem(LS_KB_ONLY_KEY);
      localStorage.removeItem(LS_HYPERTROPHY_QUEUE_KEY);
      localStorage.removeItem(LS_BELL_LEVEL_KEY);
      localStorage.removeItem(LS_ZEN_SECONDS_KEY);
      localStorage.removeItem(LS_EXERCISE_SETTINGS_KEY);
      localStorage.removeItem("dtt_pull_mode_v1");
      Object.values(timers).forEach(t => { try{ t && t.pause && t.pause(); }catch{} });
      releaseWakeLock();
      closeModal();
      boot();
    });
  });

  function syncRunningTimers(){
    Object.values(timers).forEach(t => {
      try{ if(t && t.running && typeof t.sync === "function") t.sync(); }catch{}
    });
  }

  // Visibility: sync timers and re-request wakelock only if a wakelock-eligible timer is running
  document.addEventListener('visibilitychange', () => {
    if(document.visibilityState !== 'visible') return;
    syncRunningTimers();
    // Only if circuit/carry/breathing running
    const eligibleRunning = (timers.circuit && timers.circuit.running) || (timers.carry && timers.carry.running) || (timers.breathing && timers.breathing.running);
    if(eligibleRunning) requestWakeLock();
  });

  window.addEventListener("pageshow", () => {
    syncRunningTimers();
    setInstallButtonVisible(deferredInstallPrompt || isIosLike());
  });

  // First boot
  setupInstallPrompt();
  setWakeStatus(false);
  renderRightNone();
    // If you hit 60 training sessions, show the bell-up checkpoint once.
    try{ maybeShowCheckpoint(); }catch{}

  boot();
})();
</script>
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js").catch(() => {});
  });
}
</script>
</body>
</html>
